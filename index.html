<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MUROBOX N40 Arranger</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdfdfd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 20px; text-align: center; font-weight: 800; }
        
        /* ドロップゾーン全体を相対配置の基準にする */
        .drop-zone { position: relative; border: 2px dashed #3498db; padding: 50px 20px; text-align: center; color: #3498db; border-radius: 10px; margin-bottom: 20px; font-weight: bold; overflow: hidden; background: #fefefe; transition: background 0.2s; }
        .drop-zone:hover { background: #f1f9ff; }
        
        /* 透明なファイル入力を画面上に大きく被せる（これでJSのバグを回避） */
        .file-input-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .btn { display: block; width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: background 0.2s; }
        .btn:hover:not(:disabled) { background: #27ae60; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .log { background: #2c3e50; color: #ecf0f1; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; height: 200px; overflow-y: auto; border-radius: 6px; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>MUROBOX N40 Arranger</h1>

    <div class="drop-zone">
        ここにMIDIファイルをドロップ<br>
        <span style="font-size: 0.9em; font-weight: normal; color: #7f8c8d;">またはクリックして選択</span>
        <input type="file" id="fileInput" class="file-input-overlay" accept=".mid,.midi">
    </div>
    
    <div id="fileInfo" style="margin-bottom: 15px; text-align: center; font-weight: bold; color: #2c3e50;"></div>

    <button id="processBtn" class="btn" disabled>最適化して保存</button>

    <div class="log" id="logWindow">System Ready...<br></div>
</div>

<script>
    const logEl = document.getElementById('logWindow');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    
    let currentArrayBuffer = null;

    // MUROBOX N40 ハードウェア仕様 (F2 - C6)
    const MIN_NOTE = 41; 
    const MAX_NOTE = 84; 
    const EXCLUDED_NOTES = [42, 44, 46, 49]; // F#2, G#2, A#2, C#3

    function writeLog(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // --- ファイル読み込み処理（ネイティブイベントのみ） ---
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        try {
            currentArrayBuffer = await file.arrayBuffer();
            new Midi(currentArrayBuffer); // フォーマット検証
            document.getElementById('fileInfo').textContent = `選択中: ${file.name}`;
            writeLog(`File loaded: ${file.name}`);
            processBtn.disabled = false;
        } catch (err) {
            writeLog(`[Error] 読み込み失敗: ${err.message}`);
            processBtn.disabled = true;
        }
        
        // 同じファイルを再アップロードできるようにリセット
        e.target.value = '';
    });

    // --- コアロジック: 絶対にN40の40音の中に折り返す ---
    function foldToN40(midiNote) {
        let folded = midiNote;
        
        while (folded > MAX_NOTE) folded -= 12;
        while (folded < MIN_NOTE) folded += 12;
        
        if (EXCLUDED_NOTES.includes(folded)) {
            folded += 12;
        }
        
        return folded;
    }

    // --- 最適キー探索: メロディ死守アルゴリズム ---
    processBtn.onclick = () => {
        if (!currentArrayBuffer) return;
        writeLog("最適トランスポーズを計算中...");

        const midiData = new Midi(currentArrayBuffer);
        let allNotes = [];
        midiData.tracks.forEach(t => t.notes.forEach(n => allNotes.push(n)));

        if (allNotes.length === 0) {
            writeLog("[Error] 音符データがありません。");
            return;
        }

        let bestT = 0;
        let minPenalty = Infinity;

        // -48 〜 +48 半音の全パターンをシミュレーション
        for (let t = -48; t <= 48; t++) {
            let penalty = 0;
            
            for (let note of allNotes) {
                let targetNote = note.midi + t;
                let finalNote = foldToN40(targetNote);
                
                if (targetNote !== finalNote) {
                    // 原曲の音が高いほどペナルティを重くし、メロディの折り返しを防ぐ
                    penalty += Math.pow(2.0, note.midi / 10);
                }
            }

            if (penalty < minPenalty || (penalty === minPenalty && Math.abs(t) < Math.abs(bestT))) {
                minPenalty = penalty;
                bestT = t;
            }
        }

        writeLog(`最適キー決定: ${bestT > 0 ? '+' : ''}${bestT} 半音シフト`);

        // --- 新規MIDIファイルの構築 ---
        const resultMidi = new Midi();
        
        if (midiData.header.tempos) {
            midiData.header.tempos.forEach(t => resultMidi.header.tempos.push({ ticks: t.ticks, bpm: t.bpm }));
        }
        if (midiData.header.timeSignatures) {
            midiData.header.timeSignatures.forEach(t => resultMidi.header.timeSignatures.push({ ticks: t.ticks, timeSignature: t.timeSignature }));
        }

        let foldedCount = 0;

        midiData.tracks.forEach((track, i) => {
            if (track.notes.length === 0) return;
            
            const newTrack = resultMidi.addTrack();
            newTrack.name = track.name || `Track ${i+1}`;
            newTrack.channel = track.channel;

            track.notes.forEach(note => {
                let targetNote = note.midi + bestT;
                let finalNote = foldToN40(targetNote);

                if (targetNote !== finalNote) foldedCount++;

                newTrack.addNote({
                    midi: finalNote,
                    ticks: note.ticks,
                    durationTicks: note.durationTicks,
                    velocity: note.velocity
                });
            });
        });

        writeLog(`処理完了。全 ${allNotes.length} 音をN40に配置しました。`);
        writeLog(`(伴奏等でオクターブ折り返しが発生した音: ${foldedCount} 音)`);
        
        const blob = new Blob([resultMidi.toArray()], { type: "audio/midi" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `MURO_N40_${bestT > 0 ? 'plus'+bestT : bestT}_${Date.now()}.mid`;
        a.click();
        writeLog("ダウンロードが完了しました。");
    };
</script>

</body>
</html>
