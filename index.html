<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MUROBOX N40 Filter - Melody Protect Mode</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdfdfd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.2rem; color: #444; margin-bottom: 20px; text-align: center; }
        .drop-zone { border: 2px dashed #3498db; padding: 40px; text-align: center; color: #3498db; cursor: pointer; border-radius: 10px; margin-bottom: 20px; transition: background 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { background: #eef7fd; }
        .btn { display: block; width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn:disabled { background: #ddd; cursor: not-allowed; }
        .log { background: #f8f9fa; color: #666; padding: 15px; font-family: monospace; font-size: 12px; height: 180px; overflow-y: auto; border-radius: 6px; margin-top: 20px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>MUROBOX N40 Filter<br><span style="font-size: 0.8rem; opacity: 0.6;">(F2-C6 / Melody Protect Mode)</span></h1>

    <div class="drop-zone" id="dropZone">
        ここにMIDIファイルをドロップ、またはクリックして選択
    </div>
    <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">

    <div id="fileInfo" style="margin-bottom: 10px; text-align: center; font-weight: bold;"></div>

    <button id="processBtn" class="btn" disabled>最適化して保存</button>

    <div class="log" id="logWindow">ログ: 待機中...</div>
</div>

<script>
    const logEl = document.getElementById('logWindow');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    
    let currentArrayBuffer = null;

    // N40の正確な仕様 (スタンダードMIDI規格 C4=60準拠)
    const MIN = 41; // F2
    const MAX = 84; // C6
    const INVALID = [42, 44, 46, 49]; // F#2, G#2, A#2, C#3 (演奏不可)

    function writeLog(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // --- ファイル選択とドラッグ＆ドロップの確実な処理 ---
    dropZone.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
            // 同じファイルを再度選択できるようにリセット
            e.target.value = ''; 
        }
    });

    // ドロップ領域でのブラウザデフォルト動作をキャンセル
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    // 見た目のフィードバック
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    // ドロップ時の処理
    dropZone.addEventListener('drop', (e) => {
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    }, false);
    // ---------------------------------------------------

    async function handleFile(file) {
        if (!file) return;
        try {
            currentArrayBuffer = await file.arrayBuffer();
            new Midi(currentArrayBuffer);
            document.getElementById('fileInfo').textContent = `選択中: ${file.name}`;
            writeLog(`ファイルを読み込みました: ${file.name}`);
            processBtn.disabled = false;
        } catch (err) {
            writeLog(`エラー: ${err.message}`);
            processBtn.disabled = true;
        }
    }

    function getBestOctaveShift(m) {
        let bestM = null;
        let minShiftDist = Infinity;
        
        for (let i = -10; i <= 10; i++) {
            let v = m + (i * 12);
            if (v >= MIN && v <= MAX && !INVALID.includes(v)) {
                let dist = Math.abs(i);
                if (dist < minShiftDist) {
                    minShiftDist = dist;
                    bestM = v;
                }
            }
        }
        return bestM;
    }

    function evaluateTranspose(notes, t) {
        let penalty = 0;
        let droppedCount = 0;
        let shiftedCount = 0;

        for (let note of notes) {
            let m = note.midi + t;
            let bestM = getBestOctaveShift(m);
            
            let weight = Math.pow(1.6, note.midi - 20);

            if (bestM === null) {
                penalty += weight * 10000;
                droppedCount++;
            } else if (bestM !== m) {
                penalty += weight;
                shiftedCount++;
            }
        }
        return { penalty, droppedCount, shiftedCount };
    }

    processBtn.onclick = () => {
        if (!currentArrayBuffer) return;
        writeLog("メロディライン（最高音）を最優先して最適キーを計算中...");

        const midiData = new Midi(currentArrayBuffer);
        let allNotes = [];
        midiData.tracks.forEach(track => {
            track.notes.forEach(note => allNotes.push(note));
        });

        if (allNotes.length === 0) {
            writeLog("エラー: 音符が見つかりません。");
            return;
        }

        const tCandidates = [];
        for (let i = 0; i <= 48; i++) {
            tCandidates.push(i);
            if (i !== 0) tCandidates.push(-i);
        }
        
        let bestT = 0;
        let minPenalty = Infinity;
        let bestAbsT = Infinity;

        for (let t of tCandidates) {
            let res = evaluateTranspose(allNotes, t);
            
            if (res.penalty < minPenalty) {
                minPenalty = res.penalty;
                bestT = t;
                bestAbsT = Math.abs(t);
            } 
            else if (res.penalty === minPenalty) {
                if (Math.abs(t) < bestAbsT) {
                    bestT = t;
                    bestAbsT = Math.abs(t);
                }
            }
        }

        let finalEval = evaluateTranspose(allNotes, bestT);
        writeLog(`最適キー決定: ${bestT > 0 ? '+' : ''}${bestT} 半音全体スライド`);
        writeLog(`(低音域等のオクターブ折り返し移動: ${finalEval.shiftedCount}音)`);

        const resultMidi = new Midi();
        
        if (midiData.header) {
            if (midiData.header.tempos) {
                midiData.header.tempos.forEach(t => resultMidi.header.tempos.push({ ticks: t.ticks, bpm: t.bpm }));
            }
            if (midiData.header.timeSignatures) {
                midiData.header.timeSignatures.forEach(t => resultMidi.header.timeSignatures.push({ ticks: t.ticks, timeSignature: t.timeSignature }));
            }
        }

        let keptCount = 0;
        let removedCount = 0;

        midiData.tracks.forEach((track, i) => {
            if (track.notes.length === 0) return;
            
            const newTrack = resultMidi.addTrack();
            newTrack.name = track.name || `Track ${i+1}`;
            newTrack.channel = track.channel;

            track.notes.forEach(note => {
                let m = note.midi + bestT;
                let finalM = getBestOctaveShift(m);

                if (finalM === null) {
                    removedCount++;
                } else {
                    newTrack.addNote({
                        midi: finalM,
                        ticks: note.ticks,
                        durationTicks: note.durationTicks,
                        velocity: note.velocity
                    });
                    keptCount++;
                }
            });
        });

        writeLog(`処理完了。演奏可能: ${keptCount}音 / 削除: ${removedCount}音`);
        
        const blob = new Blob([resultMidi.toArray()], { type: "audio/midi" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `n40_melody_protect_${bestT}_${Date.now()}.mid`;
        a.click();
        writeLog("ダウンロード完了。");
    };
</script>

</body>
</html>
