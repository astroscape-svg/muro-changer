<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MUROBOX N40 Filter - Auto Transpose Mode</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdfdfd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.2rem; color: #444; margin-bottom: 20px; text-align: center; }
        .drop-zone { border: 2px dashed #3498db; padding: 40px; text-align: center; color: #3498db; cursor: pointer; border-radius: 10px; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn:disabled { background: #ddd; cursor: not-allowed; }
        .log { background: #f8f9fa; color: #666; padding: 15px; font-family: monospace; font-size: 12px; height: 180px; overflow-y: auto; border-radius: 6px; margin-top: 20px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>MUROBOX N40 Filter</h1>

    <div class="drop-zone" id="dropZone">
        ここにMIDIファイルをドロップ
        <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">
    </div>

    <div id="fileInfo" style="margin-bottom: 10px; text-align: center; font-weight: bold;"></div>

    <button id="processBtn" class="btn" disabled>最適化して保存</button>

    <div class="log" id="logWindow">ログ: 待機中...</div>
</div>

<script>
    const logEl = document.getElementById('logWindow');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    
    let currentArrayBuffer = null;

    // N40の厳密な仕様
    const MIN = 53; // F2
    const MAX = 105; // A6
    const INVALID = [54, 56, 58, 61]; // F#2, G#2, A#2, C#3 (演奏不可)

    function writeLog(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        try {
            currentArrayBuffer = await file.arrayBuffer();
            // 読み込みテスト
            new Midi(currentArrayBuffer);
            document.getElementById('fileInfo').textContent = `選択中: ${file.name}`;
            writeLog(`ファイルを読み込みました: ${file.name}`);
            processBtn.disabled = false;
        } catch (err) {
            writeLog(`エラー: ${err.message}`);
            processBtn.disabled = true;
        }
    }

    // ノートをN40の範囲に収めるための最適なオクターブシフトを探す関数
    function getBestOctaveShift(m) {
        // シフトなし(0)を最優先
        const shifts = [0, 12, -12, 24, -24, 36, -36, 48, -48, 60, -60];
        for (let shift of shifts) {
            let v = m + shift;
            if (v >= MIN && v <= MAX && !INVALID.includes(v)) {
                return v;
            }
        }
        return null; // 全く演奏不可な場合
    }

    // 特定の移調量(t)を適用した際の、削除数と個別オクターブ移動数を評価する関数
    function evaluateTranspose(notes, t) {
        let dropped = 0;
        let octaveShifts = 0;

        for (let note of notes) {
            let m = note.midi + t;
            let bestM = getBestOctaveShift(m);
            
            if (bestM === null) {
                dropped++;
            } else if (bestM !== m) {
                octaveShifts++;
            }
        }
        return { dropped, octaveShifts };
    }

    processBtn.onclick = () => {
        if (!currentArrayBuffer) return;
        writeLog("最適なトランスポーズ（全体スライド）量を計算中...");

        // 毎回新しくパースし直す（テンポや複数トラック等の元データを保持するため）
        const midiData = new Midi(currentArrayBuffer);

        let allNotes = [];
        midiData.tracks.forEach(track => {
            track.notes.forEach(note => allNotes.push(note));
        });

        if (allNotes.length === 0) {
            writeLog("エラー: 音符が見つかりません。");
            return;
        }

        // 最適なトランスポーズ量を探す (-48 〜 +48 半音)
        // 個別のオクターブ移動（和音の崩れ）を防ぐため、曲全体を大きくスライドさせることも許可する
        const tCandidates = [];
        for (let i = 0; i <= 48; i++) {
            tCandidates.push(i);
            if (i !== 0) tCandidates.push(-i);
        }
        
        let bestT = 0;
        let minDropped = Infinity;
        let minShifts = Infinity;
        let bestAbsT = Infinity;

        for (let t of tCandidates) {
            let res = evaluateTranspose(allNotes, t);
            
            if (res.dropped < minDropped) {
                minDropped = res.dropped;
                minShifts = res.octaveShifts;
                bestT = t;
                bestAbsT = Math.abs(t);
            } else if (res.dropped === minDropped) {
                if (res.octaveShifts < minShifts) {
                    minShifts = res.octaveShifts;
                    bestT = t;
                    bestAbsT = Math.abs(t);
                } else if (res.octaveShifts === minShifts) {
                    // 同条件なら移動量が少ない方を優先
                    if (Math.abs(t) < bestAbsT) {
                        bestT = t;
                        bestAbsT = Math.abs(t);
                    }
                }
            }
        }

        writeLog(`最適キー決定: ${bestT > 0 ? '+' : ''}${bestT} 半音全体スライド`);
        writeLog(`(想定削除数: ${minDropped}音 / 個別オクターブ移動: ${minShifts}音)`);

        let keptCount = 0;
        let removedCount = 0;

        midiData.tracks.forEach(track => {
            // 条件を満たさないノートを除外しながら、midiノート番号を上書き
            track.notes = track.notes.filter(note => {
                let m = note.midi + bestT;
                let finalM = getBestOctaveShift(m);

                if (finalM === null) {
                    removedCount++;
                    return false; // 削除
                } else {
                    note.midi = finalM;
                    keptCount++;
                    return true; // 保持
                }
            });
        });

        writeLog(`処理完了。演奏可能: ${keptCount}音 / 最終削除: ${removedCount}音`);
        
        const blob = new Blob([midiData.toArray()], { type: "audio/midi" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `n40_transposed_${bestT}_${Date.now()}.mid`;
        a.click();
        writeLog("ダウンロード完了。");
    };
</script>

</body>
</html>
